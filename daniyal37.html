<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating Transitions in CSS</title>
    <style>
         body{
            background-color: black;
         }
         
         #box{
            display: flex;
            background-color: red;
            font-size: 34px;
            font-weight: bold;
            border: 2px solid black;
            width: 200px;
            height: 200px;
            align-items: center;
            justify-content: center;
            transition-duration: 5s;
            transition-delay: 2s
          }

          #box:hover{
            background-color: white;
            height: 400px;
            width: 400px;
            border-radius: 100px;
          }


    </style>
</head>
<body>
    <h3>this is css transition tutorial</h3>
    <div class="container">
        <div id="box">
            this is my box
        </div>

    </div>
</body>
</html>
