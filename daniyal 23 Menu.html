<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Menu</title>
    <style>
       
        .navbar{
            background-color: black;
            font-size: 30px;
            border-radius: 100px;
        }

        .navbar li{
            display: inline-block;
            padding: 20px;
            margin: 3px 3px;

        }
        .navbar li a{
            padding: 3px 3px;
            text-decoration: none;
            color: white;
         }

         .search{
        float: right;
        padding: 30px;
        margin: 999999;
        color: white;
         }

         .navbar input{
            background-color: white;
            font-style: italic;
            border: 2px solid black;
            padding: 10px;
         }

    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <ul>
                <li><a href="#">Home</a> </li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact Us</a></li>
                <div class="search">
                    THIS Is a search
                    <input type="search" name="search" id="search" placeholder="search this website">
                </div>
            </ul>
        
        </div>
    </header>
</body>
</html>
