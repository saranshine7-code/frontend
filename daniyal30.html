<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Queries</title>
    <style>
        .box{
            text-align: center;
            background-color: red;
            color: white;
            font-size: 90px
        }

    @media (max-width:200px){
      #box-1{
        background-color: aqua;
      }
    }
    @media (max-width:300px){
      #box-2{
        background-color: green;
      }
    }
    @media (max-width:400px){
      #box-3{
        background-color: blue;
      }
    }    
    @media (max-width:500px){
      #box-4{
        background-color: yellow;
      }
    }    

    </style>
</head>
<body>
    <div class="box" id="box-1">mera phele iphone hai</div>
    <div class="box" id="box-2">mera second iphone hau</div>
    <div class="box" id="box-3">mera third iphone hai</div>
    <div class="box" id="box-4">mera 4th iphone hai</div>
    <div class="box" id="box-5">mera fifth iphne hai</div>
</body>
</html>
