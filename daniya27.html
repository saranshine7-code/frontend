<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer Bar</title>
    <style>
        .container{
            display: inline-block;
        }

        .container ul li{
            display: inline-block;
            margin: auto;
            padding: 10px;
        }
        .left{
            position: absolute;
        }
        .right{
            position: absolute;
        }

        .mid{
            position: absolute;
            margin: auto;
        }
    </style>
</head>
<body>
    
    <div class="left">
        i am left
    </div>
    <div class="mid">
        i am mid
        <div class="container">
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Services</li>
                <li>Contact Us</li>
            </ul>
        </div>
    </div>
    <div class="right">
        i am right
    </div>
</body>
</html>
