<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex tutorial</title>
  <style>
    .container{
      height: 544px;
      width: 100%;
      border: 3px solid black;
      /* flex-direction: column; */
      display: flex;
      /* flex-direction: column-reverse; */
      /* flex-direction: row-reverse; */
      /* flex-direction: inherit; */
      /* flex-direction: unset; */

      flex-wrap: wrap;
      /* flex-wrap: wrap-reverse; */
      /* flex-wrap: inherit; */
      justify-content: center;
      /* justify-content: space-between; */
      /* justify-content: space-around; */
      /* justify-content: space-evenly; */
    align-items: center;
    align-items: baseline;
    align-items: end;
    align-items: last baseline;
    align-items: initial;
    align-items: stretch;
      }

    .box{
      width: 200px;
      height: 200px;
      background-color: tomato;
      margin: 10px;
      padding: 3px;
      border: 3px solid red;
    }

    #box-1{
      order: 40;
      flex-grow: 2;
    }
    #box-2{
      flex-grow: 5;
    }
    #box-3{
      flex-grow: 7;
    }

  </style>
</head>
<body>
  <h1>this is a flexbox</h1>
  <div class="container">
    <div class="box" id="box-1">my first class</div>
    <div class="box" id="box-2">my second class</div>
    <div class="box" id="box-3">my third class</div>
    <!-- <div class="box" id="box">my forth class</div>
    <div class="box" id="box">my fifth class</div>
    <div class="box" id="box">my six class</div>
    <div class="box" id="box">my seven class</div>
    <div class="box" id="box">my eight class</div>
  </div> -->
  </body>
</html>
