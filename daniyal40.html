<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating A Basic Grid</title>
    <style>
        .container{
            display: grid;
            grid-template-columns: 300px 100px 50px;
            grid-template-columns: 100px auto 500px; 
            grid-template-columns: 1fr 4fr 2fr;
            grid-template-columns: repeat(auto);
            grid-gap: 2rem;

        }

        .item{
            background-color: blue;
            /* width: 100px;
            height: 100px; */
            align-items: center;
            justify-content: center;
            display: flex;
            margin: 3px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">this is item1</div>
        <div class="item">this is item2</div>
        <div class="item">this is item3</div>

</body>
</html>
