<!DOCTYPE html>
<html lang="en">
<head>

    <title>Borders and Backgrounds</title>
    <style>
        #firstpara{
            background-color: red;
            color: white;
            height: 100px;
            width: 455px;
            border-color: green;
            /* border-width: 5px;

              height: 300px;

           background-repeat: no-repeat;
         }


    </style>

<body>
